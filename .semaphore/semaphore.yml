version: v1.0
name: "\U0001F3AF Simple CI Pipeline"
agent:
  machine:
    type: f1-standard-4
    os_image: ubuntu2404
fail_fast:
  stop:
    when: branch != 'main'
auto_cancel:
  running:
    when: branch != 'main'
  queued:
    when: branch = 'main'
blocks:
  - name: Sign
    dependencies: []
    task:
      jobs:
        - name: Sign
          commands:
            - checkout
            - cd 1-signing
            - gpg --import /home/semaphore/public.key
            - gpg --import /home/semaphore/private.key
            - gpg --output artifact.txt.sig --detach-sign artifact.txt
            - gpg --verify artifact.txt.sig artifact.txt
      secrets:
        - name: private-key-uradujko
        - name: public-key-uradujko
  - name: 'Block #2'
    dependencies:
      - Sign
    task:
      jobs:
        - name: SBOM
          commands:
            - python -m venv venv
            - source venv/bin/activate
            - pip install cyclonedx-bom
            - cyclonedx-py requirements -o bom.json

version: v1.0
name: "\U0001F3AF Simple CI Pipeline"
agent:
  machine:
    type: f1-standard-4
    os_image: ubuntu2404
fail_fast:
  stop:
    when: branch != 'main'
auto_cancel:
  running:
    when: branch != 'main'
  queued:
    when: branch = 'main'
global_job_config:
  prologue:
    commands:
      - checkout
      - sem-version python 3.12
      - 'export PATH="$HOME/.local/bin:$PATH"'
blocks:
  - name: Sign
    dependencies: []
    task:
      jobs:
        - name: Sign
          commands:
            - cd 1-signing
            - gpg --import /home/semaphore/public.key
            - gpg --import /home/semaphore/private.key
            - gpg --output artifact.txt.sig --detach-sign artifact.txt
            - gpg --verify artifact.txt.sig artifact.txt
      secrets:
        - name: private-key-uradujko
        - name: public-key-uradujko
  - name: 'Block #2'
    dependencies:
      - Sign
    task:
      jobs:
        - name: SBOM
          commands:
            - cd 2-sbom
            - pip install cyclonedx-bom
            - cyclonedx-py requirements -o bom.json
  - name: 'Block #3'
    dependencies: []
    task:
      jobs:
        - name: Run dependency scanning
          commands:
            - cd 3-dependency-scanning
            - pip install pip-audit
            - pip-audit -r requirements.txt
  - name: 'Block #4'
    dependencies:
      - 'Block #2'
    task:
      jobs:
        - name: SAST
          commands:
            - cd 4-sast
            - pip install bandit
            - bandit -r vulnerable_script.py
  - name: 'Block #5'
    dependencies: []
    task:
      jobs:
        - name: 'Job #1'
          commands:
            - cd 5-dast
            - pip install -r requirements.txt
            - pip install wapiti3
            - 'gunicorn -b 0:0:0:0:4000 app:app --daemon'
            - 'wapiti -u http://localhost:4000 -f html'
            - artifact push m03.devops.training.uradujko /root/.wapiti/generated_report

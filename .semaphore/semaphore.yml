version: v1.0
name: "\U0001F3AF Simple CI Pipeline"
agent:
  machine:
    type: f1-standard-4
    os_image: ubuntu2404
fail_fast:
  stop:
    when: branch != 'main'
auto_cancel:
  running:
    when: branch != 'main'
  queued:
    when: branch = 'main'
blocks:
  - name: Sign
    dependencies: []
    task:
      jobs:
        - name: Sign
          commands:
            - checkout
            - cd 1-signing
            - 'chmod 777 /root/public.key '
            - 'chmod 777 /root/private.key '
            - gpg --import /root/public.key
            - gpg --import /root/private.key
            - gpg --output artifact.txt.sig --detach-sign artifact.txt
            - gpg --verify artifact.txt.sig artifact.txt
      secrets:
        - name: private-key-uradujko
        - name: public-key-uradujko
